name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

# Workflow-level permissions stay read-only: this pipeline validates frontend
# code and uploads coverage without mutating repositories or Actions state.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - name: Enforce tracked artifact policy
        working-directory: .
        run: |
          set -euo pipefail
          bad_paths=$(git ls-files | grep -E '(^|/)(node_modules|dist|coverage)(/|$)|(^|/).*\.tsbuildinfo$' || true)
          if [[ -n "${bad_paths}" ]]; then
            echo "Tracked build/dependency artifacts are not allowed:"
            echo "${bad_paths}"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./src/coverage/lcov.info
          flags: backoffice
          fail_ci_if_error: false
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs:
      - validate
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backoffice-playwright-report
          path: src/playwright-report
          retention-days: 7

  trigger-platform-infra-build:
    name: Trigger Platform Infra Build
    runs-on: ubuntu-latest
    needs:
      - validate
      - e2e-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect runtime-relevant changes
        id: dispatch_scope
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [[ -n "${BASE_SHA}" && "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          NON_DOC=$(printf '%s\n' "${CHANGED}" | grep -Ev '^(docs/|public/|\.github/|README\.md$|AGENTS\.md$|LICENSE$)|\.md$' || true)
          if [[ -z "${NON_DOC}" ]]; then
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected; skipping platform-infra dispatch."
          else
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve platform-infra dispatch auth mode
        if: steps.dispatch_scope.outputs.should_dispatch == 'true'
        id: dispatch_auth
        env:
          APP_CLIENT_ID: ${{ vars['PLATFORM_INFRA_DISPATCH_APP_CLIENT_ID'] }}
          APP_PRIVATE_KEY: ${{ secrets['PLATFORM_INFRA_DISPATCH_APP_PRIVATE_KEY'] }}
        run: |
          if [[ -n "${APP_CLIENT_ID}" && -n "${APP_PRIVATE_KEY}" ]]; then
            echo "use_app_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create platform-infra dispatch token from GitHub App
        if: steps.dispatch_auth.outputs.use_app_token == 'true'
        id: platform_infra_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars['PLATFORM_INFRA_DISPATCH_APP_CLIENT_ID'] }}
          private-key: ${{ secrets['PLATFORM_INFRA_DISPATCH_APP_PRIVATE_KEY'] }}
          owner: AxiomNode
          repositories: |
            platform-infra
          permission-actions: write

      - name: Dispatch build-push in platform-infra
        if: steps.dispatch_scope.outputs.should_dispatch == 'true'
        env:
          APP_DISPATCH_TOKEN: ${{ steps.platform_infra_app_token.outputs.token }}
          PAT_DISPATCH_TOKEN: ${{ secrets.PLATFORM_INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          DISPATCH_TOKEN="${APP_DISPATCH_TOKEN:-${PAT_DISPATCH_TOKEN:-}}"

          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "Either GitHub App dispatch credentials or PLATFORM_INFRA_DISPATCH_TOKEN is required to trigger platform-infra workflow."
            exit 1
          fi

          STATUS_CODE=$(curl -sS -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AxiomNode/platform-infra/actions/workflows/build-push.yaml/dispatches \
            -d '{"ref":"main","inputs":{"service":"backoffice","source_ref":"${{ github.sha }}"}}')

          if [[ "${STATUS_CODE}" != "204" ]]; then
            echo "Failed to dispatch platform-infra workflow (HTTP ${STATUS_CODE})."
            cat /tmp/dispatch_response.json
            exit 1
          fi

          echo "Dispatched platform-infra Build & Push for backoffice."

      - name: Skip platform-infra dispatch for docs-only changes
        if: steps.dispatch_scope.outputs.should_dispatch != 'true'
        run: echo "Skipping platform-infra dispatch because this push only changed documentation or workflow files."
